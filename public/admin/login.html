<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 · 카카오봇 관리자</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-md">
    <!-- Logo / Title -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-blue-600 mb-4">
        <i data-lucide="message-circle" class="w-7 h-7 text-white"></i>
      </div>
      <h1 class="text-2xl font-bold text-slate-900">카카오봇 관리자</h1>
      <p class="text-slate-500 mt-2 text-sm">강의 자료를 관리하고 답변을 점검하세요</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
      <form class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">이메일 주소</label>
          <input
            type="email"
            placeholder="name@example.com"
            class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-slate-900"
          />
        </div>

        <button
          type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg transition flex items-center justify-center gap-2"
        >
          <i data-lucide="send" class="w-4 h-4"></i>
          로그인 링크 받기
        </button>
      </form>

      <div class="mt-6 pt-6 border-t border-slate-100">
        <p class="text-xs text-slate-500 leading-relaxed">
          입력하신 이메일로 <strong class="text-slate-700">로그인 링크</strong>가 전송됩니다.
          링크를 클릭하면 비밀번호 없이 바로 로그인됩니다.
        </p>
      </div>
    </div>

    <p class="text-center text-xs text-slate-400 mt-6">
      등록되지 않은 이메일은 관리자에게 문의해 주세요
    </p>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
